syntax = "proto3";

package urlo.v1;

import "urlo/v1/url.proto";

option go_package = "github.com/kongken/urlo/pkg/proto/urlo/v1;urlov1";

// UrlService defines the v1 URL shortener API contract.
// Planned HTTP mapping:
// - POST   /api/v1/urls           Shorten
// - GET    /api/v1/urls/{code}    Resolve
// - GET    /api/v1/urls/{code}/stats GetStats
// - DELETE /api/v1/urls/{code}    Delete
service UrlService {
  rpc Shorten(ShortenRequest) returns (ShortenResponse);
  rpc Resolve(ResolveRequest) returns (ResolveResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  // ListClicks returns recent click events for a short link, newest first.
  rpc ListClicks(ListClicksRequest) returns (ListClicksResponse);
}
