environment: "local"
base_url: "http://localhost:8080"

# ----------------------------------------------------------------------
# Storage backend for short links.
#   driver: "memory" — in-process map; resets on restart (dev/test default)
#   driver: "s3"     — store each link as JSON at {bucket}/{prefix}/{code}.json
# ----------------------------------------------------------------------
storage:
  driver: "memory"
  s3:
    # Must match a key under `store.s3.<name>` below.
    config_name: "links"
    # Object-key prefix inside the bucket. Lets one bucket host multiple
    # apps / environments / tenants. Leading & trailing "/" are trimmed.
    # Examples:
    #   "links"              -> bucket/links/{code}.json   (default if empty)
    #   "urlo/links"         -> bucket/urlo/links/{code}.json
    #   "envs/prod/urlo"     -> bucket/envs/prod/urlo/{code}.json
    prefix: "urlo/links"

# ----------------------------------------------------------------------
# Butterfly store configuration (referenced by storage.s3.config_name).
# Only required when storage.driver = "s3".
# ----------------------------------------------------------------------
store:
  s3:
    links:
      endpoint: "s3.amazonaws.com"
      region: "us-east-1"
      bucket: "urlo-links"
      access_key_id: ""
      secret_access_key: ""
      use_ssl: true
      # Set to true for MinIO / path-style endpoints.
      use_path_style: false

# ----------------------------------------------------------------------
# Per-IP rate limiting on URL creation (POST /api/v1/urls).
# Requires a redis client configured under `store.redis.<name>`.
# ----------------------------------------------------------------------
rate_limit:
  enabled: false
  redis_config_name: "cache"
  per_hour: 60

# Example redis config (uncomment when rate_limit.enabled = true):
# store:
#   redis:
#     cache:
#       addr: "localhost:6379"
#       password: ""
#       db: 0

# ----------------------------------------------------------------------
# Google login + session JWT.
#   When auth.google.client_id is empty, login is disabled and all links
#   are anonymous. Otherwise the session cookie is issued after a
#   successful Google ID-token exchange via POST /api/v1/auth/google.
# ----------------------------------------------------------------------
auth:
  google:
    client_id: ""
  session:
    # Required when auth.google.client_id is set. Min 16 chars.
    jwt_secret: ""
    cookie_name: "urlo_session"
    ttl_hours: 168
    # Set true behind HTTPS; false for local http://localhost dev.
    secure: false

# ----------------------------------------------------------------------
# Click event logging.
#   driver: "none"          - disabled (default)
#   driver: "redis_stream"  - write each redirect to a Redis Stream
#                             keyed `{key_prefix}:{code}`, capped by max_len
# Requires `store.redis.<redis_config_name>` when enabled.
# ----------------------------------------------------------------------
clicks:
  driver: "none"
  redis_config_name: "cache"
  key_prefix: "clicks"
  max_len: 10000
  ip_hash_salt: ""
  buffer_size: 1024

log:
  level: "info"
  format: "text"
  add_source: false

otel: {}
